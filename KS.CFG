#Accept the VMware End User License Agreement
vmaccepteula

#Install on the first local disk available on machine
install --firstdisk --overwritevmfs

#Set the network settings
network --bootproto=static --device=vmnic1 --vlanid=110 --ip=192.168.110.15 --netmask=255.255.255.0 --gateway=192.168.110.254 --hostname=esx01.mkv.lab --nameserver=192.168.100.1 --addvmportgroup=1

#Set the root password
rootpw <PASSWORD>

# reboot moved to the end of the pre-firstboot section (must come after
# install/network/rootpw, not between install and network)
reboot

%firstboot --interpreter=busybox

# --- Log everything from here on so failures are never silent again ---
exec >/var/log/firstboot-custom.log 2>&1
echo "firstboot started: $(date)"

NTP_SERVER=192.168.100.1
#SSH_ROOT_KEY=""
#MANAGEMENT_VLAN=30
#MANAGEMENT_VSWITCH_MTU=9000

# Wait for hostd, but bounded (was: infinite loop -> silent hang if it never succeeds)
i=0
while ! vim-cmd hostsvc/runtimeinfo >/dev/null 2>&1; do
  i=$((i+1))
  if [ $i -ge 18 ]; then
    echo "hostd not ready after 3 minutes, aborting firstboot"
    exit 1
  fi
  sleep 10
done
echo "hostd ready after ${i} retries"

# Enable & start SSH
vim-cmd hostsvc/enable_ssh
vim-cmd hostsvc/start_ssh

# Enable & start ESXi Shell
vim-cmd hostsvc/enable_esx_shell
vim-cmd hostsvc/start_esx_shell

# Suppress ESXi Shell warning
esxcli system settings advanced set -o /UserVars/SuppressShellWarning -i 1

# Configure NTP
esxcli system ntp set -e true -s $NTP_SERVER

# Set DNS and hostname
esxcli system hostname set --fqdn=esx01.mkv.lab
esxcli network ip dns search add --domain=mkv.lab
esxcli network ip dns server add --server=192.168.100.1
esxcli network ip dns server add --server=2.2.2.2

# Rename local VMFS datastore
# vim-cmd hostsvc/datastore/rename datastore1 ${VMFS_DATASTORE_NAME}

# Generate Certificate
/bin/generate-certificates

# Enable Core Dump
esxcli system coredump file set -s -e true

# Configure VM Network VLAN & MTU
# esxcli network vswitch standard portgroup set -p "VM Network" -v ${MANAGEMENT_VLAN}
# esxcli network vswitch standard set -m ${MANAGEMENT_VSWITCH_MTU} -v vSwitch0
# esxcli network ip interface set -i vmk0 -m ${MANAGEMENT_VSWITCH_MTU}

echo "firstboot completed: $(date)"
reboot
